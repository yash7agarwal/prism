# Consumed by tools/rss_retriever.py when PRISM_RETRIEVERS contains "rss".
# The planner's `inferred_industry` string is matched against the top-level
# keys here (exact → substring → fall-through to `general`).
#
# Keep lists short and high-signal. One garbage feed poisons every run of
# that vertical — prefer analyst/trade press over general news.

